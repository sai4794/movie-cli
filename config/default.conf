# movie-cli default configuration
# Priority: CLI flags > env vars > this file > built-in defaults

# Player: mpv, vlc, iina
PLAYER=mpv

# Default quality: 480, 720, 1080
QUALITY=720

# Plugin: auto (try all), or specific name
PLUGIN=auto

# UI backend: fzf, rofi, dmenu
# UI_BACKEND=fzf

# Verbose output (0 or 1)
VERBOSE=0

# Debug output (0 or 1)
DEBUG=0
