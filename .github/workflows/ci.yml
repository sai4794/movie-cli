name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint
        run: shellcheck --severity=warning --exclude=SC1090 --exclude=SC2034 --exclude=SC2206 movie-cli lib/*.sh plugins/*.sh install.sh uninstall.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y mpv fzf jq curl python3 socat
      - name: Install test framework
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git tests/bats
          git clone --depth 1 https://github.com/bats-core/bats-support.git tests/bats-support
          git clone --depth 1 https://github.com/bats-core/bats-assert.git tests/bats-assert
      - name: Syntax check
        run: bash -n movie-cli && bash -n lib/*.sh && bash -n plugins/*.sh && bash -n install.sh && bash -n uninstall.sh
      - name: Run tests
        run: tests/bats/bin/bats tests/*.sh

  install:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n install.sh
      - name: Verify main script
        run: bash -n movie-cli
