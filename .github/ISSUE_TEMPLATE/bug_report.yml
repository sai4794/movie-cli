name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `movie-cli "query"`
        2. Select result
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "`movie-cli --version`"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24.04"
    validations:
      required: true
  - type: dropdown
    id: player
    attributes:
      label: Player
      options:
        - mpv
        - vlc
        - iina
    validations:
      required: true
